name: Feature request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Note: the anchor **grammar is frozen** — existing anchor forms must parse
        identically forever. New fragment kinds can be discussed, but changes to how an
        existing anchor parses will not be accepted.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behaviour
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
