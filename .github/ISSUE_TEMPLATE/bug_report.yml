name: Bug report
description: Something isn't working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! A minimal reproduction using only `attestable` gets this fixed fastest.
  - type: input
    id: version
    attributes:
      label: attestable version
      placeholder: "0.1.0 (python -c 'import attestable; print(attestable.__version__)')"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version & OS
      placeholder: "3.12 on macOS 14"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A few lines that trigger the problem.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
